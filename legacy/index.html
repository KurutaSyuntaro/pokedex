<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ポケモン図鑑の一覧表示ページ">
  <title>ポケモン図鑑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="hero">
    <h1>ポケモン図鑑</h1>
    <p>全国図鑑をサクッと閲覧。メガ進化・リージョン違いも表示、名前検索と世代フィルターに対応。</p>

    <div class="controls" role="search">
      <label class="control-field" for="search-input">
        <span>名前で検索</span>
        <input id="search-input" type="search" placeholder="例: ピカチュウ / pikachu" autocomplete="off">
      </label>

      <label class="control-field" for="limit-select">
        <span>表示世代</span>
        <select id="limit-select">
          <option value="all" selected>全世代 (#1-1025)</option>
          <option value="gen1">第1世代 カントー (#1-151)</option>
          <option value="gen2">第2世代 ジョウト (#152-251)</option>
          <option value="gen3">第3世代 ホウエン (#252-386)</option>
          <option value="gen4">第4世代 シンオウ (#387-493)</option>
          <option value="gen5">第5世代 イッシュ (#494-649)</option>
          <option value="gen6">第6世代 カロス (#650-721)</option>
          <option value="gen7">第7世代 アローラ (#722-809)</option>
          <option value="gen8">第8世代 ガラル/ヒスイ (#810-905)</option>
          <option value="gen9">第9世代 パルデア (#906-1025)</option>
        </select>
      </label>

      <label class="toggle-field" for="shiny-toggle">
        <input id="shiny-toggle" type="checkbox">
        <span>色違いを表示</span>
      </label>
    </div>

    <p id="result-count" class="result-count" aria-live="polite">読み込み中...</p>
  </header>

  <main>
    <section id="pokedex-grid" class="pokedex-grid" aria-label="ポケモン一覧"></section>
  </main>

  <template id="pokemon-card-template">
    <a class="pokemon-card-link" href="#">
      <article class="pokemon-card">
        <img class="sprite" alt="" loading="lazy" decoding="async">
        <p class="number"></p>
        <p class="name"></p>
      </article>
    </a>
  </template>

  <script src="js/app.js"></script>
</body>
</html>
